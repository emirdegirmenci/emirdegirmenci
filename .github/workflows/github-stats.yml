name: Generate GitHub Metrics

on:
  # Her gün 03:00 UTC'de çalışır
  schedule:
    - cron: "0 3 * * *"
  # Actions sekmesinden elle de tetikleyebilirsin
  workflow_dispatch:
  # main'e push olduğunda da bir kez üretir
  push:
    branches:
      - main

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Güvenlik için tam commit SHA'sına pinlendi (v3.34)
      - uses: lowlighter/metrics@65836723097537a54cd8eb90f61839426b4266b6
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          user: emirdegirmenci
          filename: generated/metrics.svg
          # Terminal görünümü + yanıp sönen imleç animasyonu
          template: terminal
          config_animations: yes
          config_timezone: Europe/Istanbul
          # Commit sayısı vb. temel istatistikler
          base: header
          # Aktivite akışı: commit (push), PR, issue, release
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 0
          plugin_activity_filter: push, pull_request, issue, release
          # Aktif gün/saat alışkanlıkları
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          # Private repo katkıları (org dahil) toplam istatistiklerde sayılır
          repositories_affiliations: owner, collaborator, organization_member
